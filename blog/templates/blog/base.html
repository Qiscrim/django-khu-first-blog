{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Web Service Programming blog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/blog.css' %}">
</head>
<body>
    <div class="page-header">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="{% url 'post_list' %}" class="top-menu">
                <h1>Web Service Programming blog</h1>
            </a>
            <a href="{% url 'post_new' %}" class="top-menu" style="color: white; font-size: 3rem; font-weight: bold; text-decoration: none;">
                ＋
            </a>
        </div>
    </div>
    <div class="content container mt-4">
        <div class="row">
            <div class="col-md-8">
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
